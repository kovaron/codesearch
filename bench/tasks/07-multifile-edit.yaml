id: replace-nomic-embed-text
kind: edit
prompt: |
  Replace every occurrence of the string "nomic-embed-text" with
  "nomic-embed-text-v2" in all *.go files in this repository.
  When done, state which files you changed.
arms: [codesearch, baseline]
turn_cap: 20
timeout_seconds: 120
golden:
  type: file_diff
  expected_files:
    - path: internal/embedder/ollama.go
      contains:
        - "nomic-embed-text-v2"
      not_contains:
        - "nomic-embed-text\""
