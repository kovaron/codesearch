id: rename-parseQdrantURL
kind: edit
prompt: |
  Rename the function parseQdrantURL to parseQdrantEndpoint throughout this
  repository. Update every call site and the definition.
  When done, state which files you modified.
arms: [codesearch, baseline]
turn_cap: 20
timeout_seconds: 120
golden:
  type: file_diff
  expected_files:
    - path: cmd/codesearch/cmd_daemon.go
      contains:
        - "parseQdrantEndpoint"
      not_contains:
        - "parseQdrantURL"
